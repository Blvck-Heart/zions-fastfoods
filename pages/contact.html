<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

    <style>
         * {
        box-sizing: border-box;
        font-family: Montserrat, sans-serif;
        text-decoration: none;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        background-color: darkgray;
        border-radius: 5px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .logo {
		width: 40px;
		height: 40px;
        border-radius: 10px;
	}

      nav {
        display: flex;
      }
      nav ul {
        list-style-type: none;
        margin-left: 620px;
        display: flex;
        align-items: center;
      }
      nav ul li {
        display: flex;
        margin-right: 20px;
        justify-content: center;
        align-items: center;
      }

      nav ul li a {
        color: black;
        display: block;
      }

      .map iframe {
        width: 500px;
        height: 500px;
      }
    </style>
</head>
<body>
    <header>
      <a href="/" class="home-logo"><img src="/images/sea.png" alt="" class="logo"></a>
      <p>Filling your stomach is our mission...</p>
      <nav>
        <ul>
          <li><a href="/"> Home </a></li>
          <li><a href="/pages/order.html"> Order </a></li>
          <li><a href="/pages/menu.html"> Menu </a></li>
          <li><a href="/pages/contact.html"> Contact </a></li>
        </ul>
      </nav>

    <div class="map">

    </div>

</html>
