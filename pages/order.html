<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
     * {
        box-sizing: border-box;
        font-family: Montserrat, sans-serif;
        text-decoration: none;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        background-color: darkgray;
        border-radius: 5px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .logo {
		width: 40px;
		height: 40px;
        border-radius: 10px;
	}

      nav {
        display: flex;
      }
      nav ul {
        list-style-type: none;
        margin-left: 620px;
        display: flex;
        align-items: center;
      }
      nav ul li {
        display: flex;
        margin-right: 20px;
        justify-content: center;
        align-items: center;
      }

      nav ul li a {
        color: black;
        display: block;
      }

      div .container {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      form {
        display: flex;
        flex-direction: column;
        border: 3px solid black;
        border-radius: 10px;
        margin: 50px auto;
        padding: 40px;
        width: 400px;
      }

      form .header h1 span {
        font-style: italic;
      }

      form label {
        margin-bottom: 10px;
        font-weight: bold;
      }

      form input {
        margin-bottom: 10px;
        border: 1px solid lightgray;
        border-radius: 5px;
        padding: 10px;
      }

      form select {
        border: 1px solid lightgray;
        border-radius: 5px;
        padding: 5px;
        margin-bottom: 5px;
      }

      button {
        background-color: lightblue;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <header>
     <a href="/" class="home-logo"><img src="/images/sea.png" alt="" class="logo"></a>
      <p>Filling your stomach is our mission...</p>
      <nav>
        <ul>
          <li><a href="../index.html"> Home </a></li>
          <li><a href="/pages/order.html"> Order </a></li>
          <li><a href="/pages/menu.html"> Menu </a></li>
          <li><a href="/pages/contact.html"> Contact </a></li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <form action="" class="contact-form">
        <div class="header">
          <h1>Be Satisfied <span>Soon...</span></h1>
        </div>
        <label for="name" class="name">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
        /><br />

        <label for="phone">Phone Number:</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="Enter your phone number"
        />

        <label for="email">Select food:</label>
        <select name="food" class="food-select">
          <option value="okpa">Select Food</option>
          <option value="okpa">Okpa</option>
          <option value="pizza">Pizza</option>
          <option value="garri">Garri</option>
        </select>
        <br />

        <label for="message" class="quantity">Quantity:</label>
        <select name="quantity" class="quantity-select">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <br />

        <label for="address">Delivery Address:</label>
        <input
          type="text"
          class="address"
          name="address"
          placeholder="Enter your delivery address"
        />
        <br />

        <button type="submit">Order Now</button>
      </form>
    </div>
  </body>
</html>
